<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Geck-OS</title>

    <!--
      ELIMINAMOS los preconnect de Stripe que Lighthouse marcaba como
      "establecidos previamente que no se han usado" → penalizaban la puntuación.
      Stripe ahora carga lazy solo cuando el usuario abre el modal de pago.
    -->

    <!--
      NOTA SOBRE EL LCP:
      La imagen de fondo (/assets/mi-fondo-*.jpg) se carga ahora como <img>
      real con fetchpriority="high" en DesktopHeroSection.jsx.
      No podemos hacer <link rel="preload"> aquí porque Vite hashea el nombre
      del archivo en build time — la URL exacta solo se conoce después del build.

      Si quieres añadir el preload en producción, agrega en netlify.toml:
        [[headers]]
          for = "/"
          [headers.values]
            Link = '</assets/mi-fondo-HASH.jpg>; rel=preload; as=image; fetchpriority=high'
    -->
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
