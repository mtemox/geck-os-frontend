<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Geck-OS</title>

    <!--
      PRECONNECT para recursos de terceros críticos.
      Se añaden aquí (no solo en JS) para que el navegador
      pueda iniciar la conexión TCP/TLS en paralelo con la
      descarga del HTML, antes incluso de que React monte.

      Lighthouse reportaba que js.stripe.com y m.stripe.network
      no tenían preconnect → penalizaban LCP y FCP.

      NOTA: NO añadimos preload de stripe.js aquí porque queremos
      que Stripe cargue lazy (solo cuando el usuario abra el modal).
      El preconnect solo establece la conexión, no descarga nada.
    -->
    <link rel="preconnect" href="https://js.stripe.com" crossorigin />
    <link rel="preconnect" href="https://m.stripe.network" crossorigin />

    <!--
      Preconnect para la fuente Geist (si se sirve desde un CDN externo).
      Si Geist se sirve desde /assets (bundle de Vite), este preconnect
      no es necesario — puedes eliminarlo.
    -->
    <!-- <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin /> -->

    <!--
      NO añadimos preload de las imágenes de wallpaper aquí porque:
      1. Son muy pesadas (6-7MB) y bloquearían la carga inicial.
      2. El componente DesktopHeroSection ya las carga con new Image()
         de forma controlada y sin bloquear el render.
      3. La imagen LCP real es el fondo CSS del div, que el navegador
         descubre solo al evaluar el CSSOM — para preloads de bg-image
         necesitarías conocer la URL exacta en build time.
    -->
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
